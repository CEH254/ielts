<script>
    // ===== DATA STORE =====
    const ADMIN = { email: 'admin@ielts.com', password: 'admin123' };
    let testTakers = [];
    let currentUser = null;
    let loginMode = 'taker';

    // ===== PERSISTENCE (localStorage) =====
    function saveData() {
        localStorage.setItem('ielts_testTakers', JSON.stringify(testTakers));
    }

    function loadData() {
        const stored = localStorage.getItem('ielts_testTakers');
        if (stored) {
            testTakers = JSON.parse(stored);
        } else {
            // Seed default data only on first ever visit
            testTakers = [
                {
                    name: 'SYED WASAY ALI',
                    email: 'syed.wasay@example.com',
                    password: 'password123',
                    dob: '12 Oct 1995',
                    idDoc: 'Passport (PK992831)',
                    language: 'Urdu',
                    testType: 'IELTS Academic',
                    testDate: 'Saturday February 5 2022',
                    reference: 'A3-PK015-S-7101306',
                    trf: '21PK001029ALIW710A',
                    listening: 8.0,
                    reading: 7.0,
                    writing: 6.5,
                    speaking: 6.0
                },
                {
                    name: 'JANE MUTHONI',
                    email: 'jane.m@example.com',
                    password: 'jane2024',
                    dob: '23 Mar 1998',
                    idDoc: 'National ID (KE38291045)',
                    language: 'Swahili',
                    testType: 'IELTS Academic',
                    testDate: 'Saturday March 12 2024',
                    reference: 'A3-KE022-S-8203417',
                    trf: '24KE002015MUTJ820A',
                    listening: 7.5,
                    reading: 8.0,
                    writing: 7.0,
                    speaking: 7.5
                }
            ];
            saveData();
        }
    }

    // Band descriptors
    const bandDescriptors = {
        9: { title: 'Expert User', desc: 'The test taker has fully operational command of the language. Their use of English is appropriate, accurate and fluent, and shows complete understanding.' },
        8.5: { title: 'Very Good User', desc: 'The test taker has fully operational command of the language with only occasional unsystematic inaccuracies and inappropriate usage. They may misunderstand some things in unfamiliar situations. They handle complex and detailed argumentation well.' },
        8: { title: 'Very Good User', desc: 'The test taker has fully operational command of the language with only occasional unsystematic inaccuracies and inappropriate usage. They may misunderstand some things in unfamiliar situations. They handle complex and detailed argumentation well.' },
        7.5: { title: 'Good User', desc: 'The test taker has operational command of the language, though with occasional inaccuracies, inappropriate usage and misunderstandings in some situations. They generally handle complex language well and understand detailed reasoning.' },
        7: { title: 'Good User', desc: 'The test taker has operational command of the language, though with occasional inaccuracies, inappropriate usage and misunderstandings in some situations. They generally handle complex language well and understand detailed reasoning.' },
        6.5: { title: 'Competent User', desc: 'The test taker has an effective command of the language despite some inaccuracies, inappropriate usage and misunderstandings. They can use and understand fairly complex language, particularly in familiar situations.' },
        6: { title: 'Competent User', desc: 'The test taker has an effective command of the language despite some inaccuracies, inappropriate usage and misunderstandings. They can use and understand fairly complex language, particularly in familiar situations.' },
        5.5: { title: 'Modest User', desc: 'The test taker has a partial command of the language, and copes with overall meaning in most situations, although they are likely to make many mistakes. They should be able to handle basic communication in their own field.' },
        5: { title: 'Modest User', desc: 'The test taker has a partial command of the language, and copes with overall meaning in most situations, although they are likely to make many mistakes. They should be able to handle basic communication in their own field.' },
        4.5: { title: 'Limited User', desc: 'The test taker\'s basic competence is limited to familiar situations. They frequently show problems in understanding and expression. They are not able to use complex language.' },
        4: { title: 'Limited User', desc: 'The test taker\'s basic competence is limited to familiar situations. They frequently show problems in understanding and expression. They are not able to use complex language.' }
    };

    function getBandDescriptor(score) {
        const s = parseFloat(score);
        if (s >= 8.5) return bandDescriptors[9];
        if (s >= 7.5) return bandDescriptors[7.5];
        if (s >= 6.5) return bandDescriptors[6.5];
        if (s >= 5.5) return bandDescriptors[5.5];
        if (s >= 4.5) return bandDescriptors[4.5];
        return { title: 'Limited User', desc: 'The test taker has great difficulty understanding spoken and written English.' };
    }

    function calcOverall(l, r, w, s) {
        const avg = (parseFloat(l) + parseFloat(r) + parseFloat(w) + parseFloat(s)) / 4;
        return (Math.round(avg * 2) / 2).toFixed(1);
    }

    // ===== NAVIGATION =====
    function updateNav() {
        const nav = document.getElementById('main-nav');
        const utils = document.getElementById('utility-links');

        if (currentUser === 'admin') {
            nav.innerHTML = `
                <a onclick="navigateTo('landing')" data-nav="landing">🏠 Home</a>
                <a onclick="navigateTo('admin')" data-nav="admin" class="active">🛡️ Admin Panel</a>
            `;
            utils.innerHTML = `
                <a style="font-weight:bold; color:var(--bc-purple);">🛡️ Administrator</a>
                <a onclick="doLogout()" style="cursor:pointer;">Sign out</a>
            `;
        } else if (currentUser !== null && currentUser !== 'admin') {
            const user = testTakers[currentUser];
            nav.innerHTML = `
                <a onclick="navigateTo('landing')" data-nav="landing">🏠 Home</a>
                <a onclick="navigateTo('results')" data-nav="results">Test Results</a>
                <a onclick="navigateTo('test-taker')" data-nav="test-taker">Test Taker</a>
            `;
            utils.innerHTML = `
                <a style="font-weight:bold; color:var(--bc-purple);">👤 ${user.name}</a>
                <a onclick="doLogout()" style="cursor:pointer;">Sign out</a>
            `;
        } else {
            nav.innerHTML = `
                <a onclick="navigateTo('landing')" data-nav="landing" class="active">🏠 Home</a>
            `;
            utils.innerHTML = `
                <a onclick="navigateTo('login')">🔑 Sign in</a>
                <a>Contact us</a>
            `;
        }
    }

    function navigateTo(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const portalWrapper = document.getElementById('portal-wrapper');

        document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));

        if (pageId === 'landing') {
            document.getElementById('page-landing').classList.add('active');
            portalWrapper.style.display = 'none';
            document.querySelector('#main-nav a[data-nav="landing"]')?.classList.add('active');
        } else if (pageId === 'login') {
            document.getElementById('page-login').classList.add('active');
            portalWrapper.style.display = 'none';
            document.getElementById('login-error').style.display = 'none';
        } else if (pageId === 'admin') {
            document.getElementById('page-admin').classList.add('active');
            portalWrapper.style.display = 'none';
            document.querySelector('#main-nav a[data-nav="admin"]')?.classList.add('active');
            renderAdminDashboard();
        } else if (currentUser !== null && currentUser !== 'admin') {
            portalWrapper.style.display = 'block';
            const user = testTakers[currentUser];
            renderPortalHeader(user);

            const target = document.getElementById('page-' + pageId);
            if (target) target.classList.add('active');

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (pageId === 'results') {
                document.getElementById('tab-results').classList.add('active');
                document.querySelector('#main-nav a[data-nav="results"]')?.classList.add('active');
                renderResults(user);
            }
            if (pageId === 'test-taker') {
                document.getElementById('tab-taker').classList.add('active');
                document.querySelector('#main-nav a[data-nav="test-taker"]')?.classList.add('active');
                renderTakerInfo(user);
            }
            if (pageId === 'dashboard') {
                document.getElementById('page-dashboard').classList.add('active');
            }
        }
        window.scrollTo(0, 0);
    }

    // ===== LOGIN =====
    function setLoginMode(mode) {
        loginMode = mode;
        document.querySelectorAll('.login-toggle-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('admin-hint').style.display = mode === 'admin' ? 'block' : 'none';
        document.getElementById('login-error').style.display = 'none';
        document.getElementById('login-email').value = '';
        document.getElementById('login-password').value = '';
        if (mode === 'admin') {
            document.getElementById('login-email').placeholder = 'Admin email';
            document.getElementById('login-password').placeholder = 'Admin password';
        } else {
            document.getElementById('login-email').placeholder = 'Enter your email';
            document.getElementById('login-password').placeholder = 'Enter your password';
        }
    }

    function doLogin() {
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const password = document.getElementById('login-password').value;
        const errEl = document.getElementById('login-error');

        if (!email || !password) {
            errEl.textContent = 'Please enter both email and password.';
            errEl.style.display = 'block';
            return;
        }

        if (loginMode === 'admin') {
            if (email === ADMIN.email && password === ADMIN.password) {
                currentUser = 'admin';
                updateNav();
                navigateTo('admin');
            } else {
                errEl.textContent = 'Invalid admin credentials.';
                errEl.style.display = 'block';
            }
        } else {
            const idx = testTakers.findIndex(t => t.email.toLowerCase() === email && t.password === password);
            if (idx !== -1) {
                currentUser = idx;
                updateNav();
                navigateTo('results');
            } else {
                errEl.textContent = 'Invalid email or password. Please contact your administrator.';
                errEl.style.display = 'block';
            }
        }
    }

    function doLogout() {
        currentUser = null;
        updateNav();
        navigateTo('landing');
    }

    // ===== RENDER: Test Taker Portal =====
    function renderPortalHeader(user) {
        document.getElementById('portal-header-info').innerHTML = `
            <h2 style="margin:0;">${user.testType}</h2>
            <div style="color:#666; font-size:18px;">${user.name}, ${user.testDate}</div>
            <div style="font-size:12px; color:#999;">Reference: ${user.reference}</div>
        `;
    }

    function renderTakerInfo(user) {
        document.getElementById('taker-info-table').innerHTML = `
            <tr style="border-bottom:1px solid #eee;"><td style="padding:12px 0;color:#666;width:40%;">Full Name</td><td style="padding:12px 0;font-weight:bold;">${user.name}</td></tr>
            <tr style="border-bottom:1px solid #eee;"><td style="padding:12px 0;color:#666;">Date of Birth</td><td style="padding:12px 0;font-weight:bold;">${user.dob}</td></tr>
            <tr style="border-bottom:1px solid #eee;"><td style="padding:12px 0;color:#666;">ID Document</td><td style="padding:12px 0;font-weight:bold;">${user.idDoc}</td></tr>
            <tr><td style="padding:12px 0;color:#666;">First Language</td><td style="padding:12px 0;font-weight:bold;">${user.language}</td></tr>
        `;
    }

    function renderResults(user) {
        const overall = calcOverall(user.listening, user.reading, user.writing, user.speaking);
        const desc = getBandDescriptor(overall);
        document.getElementById('results-display').innerHTML = `
            <div style="padding:15px 20px;font-size:13px;color:#666;border-bottom:1px solid #eee;">
                Test Report Form (TRF) Number: <span style="background:#eee;border-radius:3px;padding:2px 5px;">${user.trf}</span>
            </div>
            <div class="row"><div class="row-label">🎧 Listening</div><div class="row-score">${parseFloat(user.listening).toFixed(1)}</div></div>
            <div class="row"><div class="row-label">📖 Reading</div><div class="row-score">${parseFloat(user.reading).toFixed(1)}</div></div>
            <div class="row"><div class="row-label">✍️ Writing</div><div class="row-score">${parseFloat(user.writing).toFixed(1)}</div></div>
            <div class="row"><div class="row-label">💬 Speaking</div><div class="row-score">${parseFloat(user.speaking).toFixed(1)}</div></div>
            <div class="row row-overall"><div class="row-label">Overall</div><div class="row-score" style="font-size:24px;color:var(--bc-purple);">${overall}</div></div>
        `;
        document.getElementById('feedback-display').innerHTML = `
            <div style="font-weight:bold;margin-bottom:10px;">${desc.title}</div>
            <p style="margin:0;font-size:14px;color:#555;">${desc.desc}</p>
        `;
        const expText = `Your overall band score of ${overall} is calculated as the average of your four component scores (Listening: ${parseFloat(user.listening).toFixed(1)}, Reading: ${parseFloat(user.reading).toFixed(1)}, Writing: ${parseFloat(user.writing).toFixed(1)}, Speaking: ${parseFloat(user.speaking).toFixed(1)}), rounded to the nearest whole or half band. This places you in the "${desc.title}" category.`;
        document.getElementById('explanation-text').textContent = expText;
        document.getElementById('score-explanation').style.display = 'none';
    }

    function toggleExplanation() {
        const el = document.getElementById('score-explanation');
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    // ===== ADMIN: Render =====
    function renderAdminDashboard() {
        renderAdminStats();
        renderUserTable();
    }

    function renderAdminStats() {
        const total = testTakers.length;
        let avgOverall = 0;
        if (total > 0) {
            const sum = testTakers.reduce((acc, t) => acc + parseFloat(calcOverall(t.listening, t.reading, t.writing, t.speaking)), 0);
            avgOverall = (sum / total).toFixed(1);
        }
        document.getElementById('admin-stats').innerHTML = `
            <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Test Takers</div></div>
            <div class="stat-card"><div class="stat-num">${avgOverall || '—'}</div><div class="stat-label">Avg Overall Band</div></div>
            <div class="stat-card"><div class="stat-num">🟢</div><div class="stat-label">System Active</div></div>
        `;
    }

    function renderUserTable() {
        const container = document.getElementById('user-table-container');
        const search = (document.getElementById('search-users')?.value || '').toLowerCase();
        const filtered = testTakers.map((t, i) => ({...t, _idx: i})).filter(t =>
            t.name.toLowerCase().includes(search) || t.email.toLowerCase().includes(search)
        );

        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">📭</div>
                    <p>${testTakers.length === 0 ? 'No test takers yet. Create one above!' : 'No results match your search.'}</p>
                </div>
            `;
            return;
        }

        let html = `<table class="user-table">
            <thead><tr>
                <th>#</th><th>Name</th><th>Email</th><th>Overall</th><th>Test Type</th><th>Actions</th>
            </tr></thead><tbody>`;
        filtered.forEach((t, i) => {
            const ov = calcOverall(t.listening, t.reading, t.writing, t.speaking);
            const badgeClass = parseFloat(ov) >= 7 ? 'badge-green' : parseFloat(ov) >= 5.5 ? 'badge-blue' : 'badge-purple';
            html += `<tr>
                <td>${t._idx + 1}</td>
                <td style="font-weight:bold;">${t.name}</td>
                <td style="color:#666;">${t.email}</td>
                <td><span class="badge ${badgeClass}">${ov}</span></td>
                <td style="font-size:12px;">${t.testType}</td>
                <td class="actions">
                    <button class="btn btn-blue btn-small" onclick="openEditModal(${t._idx})">✏️ Edit</button>
                    <button class="btn btn-red btn-small" onclick="deleteUser(${t._idx})">🗑️</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // ===== ADMIN: Create =====
    function createTestTaker() {
        const alertEl = document.getElementById('create-alert');
        const name = document.getElementById('new-name').value.trim();
        const email = document.getElementById('new-email').value.trim();
        const password = document.getElementById('new-password').value.trim();
        const dob = document.getElementById('new-dob').value.trim();
        const idDoc = document.getElementById('new-id-doc').value.trim();
        const language = document.getElementById('new-language').value.trim();
        const testType = document.getElementById('new-test-type').value;
        const testDate = document.getElementById('new-test-date').value.trim();
        const reference = document.getElementById('new-reference').value.trim();
        const trf = document.getElementById('new-trf').value.trim();
        const listening = document.getElementById('new-listening').value;
        const reading = document.getElementById('new-reading').value;
        const writing = document.getElementById('new-writing').value;
        const speaking = document.getElementById('new-speaking').value;

        if (!name || !email || !password) {
            alertEl.innerHTML = '<div class="alert alert-error">Name, email and password are required.</div>';
            return;
        }
        if (testTakers.some(t => t.email.toLowerCase() === email.toLowerCase())) {
            alertEl.innerHTML = '<div class="alert alert-error">An account with this email already exists.</div>';
            return;
        }
        if (!listening || !reading || !writing || !speaking) {
            alertEl.innerHTML = '<div class="alert alert-error">Please enter all four band scores.</div>';
            return;
        }

        testTakers.push({
            name: name.toUpperCase(),
            email,
            password,
            dob: dob || 'N/A',
            idDoc: idDoc || 'N/A',
            language: language || 'N/A',
            testType,
            testDate: testDate || 'N/A',
            reference: reference || 'N/A',
            trf: trf || 'N/A',
            listening: parseFloat(listening),
            reading: parseFloat(reading),
            writing: parseFloat(writing),
            speaking: parseFloat(speaking)
        });

        saveData(); // <-- PERSIST TO LOCALSTORAGE

        alertEl.innerHTML = `<div class="alert alert-success">✅ Account created for <strong>${name.toUpperCase()}</strong> (${email})</div>`;

        ['new-name','new-email','new-password','new-dob','new-id-doc','new-language','new-test-date','new-reference','new-trf','new-listening','new-reading','new-writing','new-speaking'].forEach(id => {
            document.getElementById(id).value = '';
        });

        renderAdminDashboard();
        setTimeout(() => { alertEl.innerHTML = ''; }, 4000);
    }

    // ===== ADMIN: Edit =====
    function openEditModal(idx) {
        const t = testTakers[idx];
        document.getElementById('edit-index').value = idx;
        document.getElementById('edit-name').value = t.name;
        document.getElementById('edit-email').value = t.email;
        document.getElementById('edit-password').value = t.password;
        document.getElementById('edit-dob').value = t.dob;
        document.getElementById('edit-id-doc').value = t.idDoc;
        document.getElementById('edit-language').value = t.language;
        document.getElementById('edit-test-type').value = t.testType;
        document.getElementById('edit-test-date').value = t.testDate;
        document.getElementById('edit-reference').value = t.reference;
        document.getElementById('edit-trf').value = t.trf;
        document.getElementById('edit-listening').value = t.listening;
        document.getElementById('edit-reading').value = t.reading;
        document.getElementById('edit-writing').value = t.writing;
        document.getElementById('edit-speaking').value = t.speaking;
        document.getElementById('edit-alert').innerHTML = '';
        document.getElementById('edit-modal').classList.add('active');
    }

    function closeEditModal() {
        document.getElementById('edit-modal').classList.remove('active');
    }

    function saveEdit() {
        const idx = parseInt(document.getElementById('edit-index').value);
        const alertEl = document.getElementById('edit-alert');
        const name = document.getElementById('edit-name').value.trim();
        const email = document.getElementById('edit-email').value.trim();
        const password = document.getElementById('edit-password').value.trim();

        if (!name || !email || !password) {
            alertEl.innerHTML = '<div class="alert alert-error">Name, email and password are required.</div>';
            return;
        }
        const dup = testTakers.findIndex((t, i) => i !== idx && t.email.toLowerCase() === email.toLowerCase());
        if (dup !== -1) {
            alertEl.innerHTML = '<div class="alert alert-error">Another account with this email already exists.</div>';
            return;
        }

        testTakers[idx] = {
            name: name.toUpperCase(),
            email,
            password,
            dob: document.getElementById('edit-dob').value.trim() || 'N/A',
            idDoc: document.getElementById('edit-id-doc').value.trim() || 'N/A',
            language: document.getElementById('edit-language').value.trim() || 'N/A',
            testType: document.getElementById('edit-test-type').value,
            testDate: document.getElementById('edit-test-date').value.trim() || 'N/A',
            reference: document.getElementById('edit-reference').value.trim() || 'N/A',
            trf: document.getElementById('edit-trf').value.trim() || 'N/A',
            listening: parseFloat(document.getElementById('edit-listening').value) || 0,
            reading: parseFloat(document.getElementById('edit-reading').value) || 0,
            writing: parseFloat(document.getElementById('edit-writing').value) || 0,
            speaking: parseFloat(document.getElementById('edit-speaking').value) || 0,
        };

        saveData(); // <-- PERSIST TO LOCALSTORAGE

        closeEditModal();
        renderAdminDashboard();
    }

    // ===== ADMIN: Delete =====
    function deleteUser(idx) {
        if (confirm(`Delete ${testTakers[idx].name}? This cannot be undone.`)) {
            testTakers.splice(idx, 1);
            saveData(); // <-- PERSIST TO LOCALSTORAGE
            if (currentUser === idx) { currentUser = null; updateNav(); }
            else if (typeof currentUser === 'number' && currentUser > idx) { currentUser--; }
            renderAdminDashboard();
        }
    }

    // ===== INITIALIZE =====
    loadData();       // Load from localStorage (or seed defaults on first visit)
    navigateTo('landing');
</script>
